plugins:
  topic_content_view_enabled:
    default: true
    client: true

  # All view modes (presets + user-defined) stored as a JSON array.
  # Each entry: { "value": "slug", "label": "Display Name", "classes": "tcv-mode tcv-slug", "css": "body.tcv-mode { ... }" }
  # - value:   the ?tcv=VALUE slug used in the URL
  # - label:   human-readable name shown in the admin UI
  # - classes: space-separated body classes applied when the mode is active
  # - css:     custom CSS injected into <head> at runtime (plain CSS, not SCSS)
  # Managed via Admin > Plugins > Topic Content View
  topic_content_view_modes:
    default: |
      [{"value":"content","label":"Content Only","classes":"tcv-mode","css":"","preset":true},{"value":"minimal","label":"Minimal","classes":"tcv-mode tcv-minimal","css":"","preset":true},{"value":"full","label":"Full","classes":"tcv-mode tcv-full","css":"","preset":true}]
    type: string
    client: true
