plugins:
  topic_view_modes_enabled:
    default: true
    client: true

  # All view modes (presets + user-defined) stored as a JSON array.
  # Each entry: { "value": "slug", "label": "Display Name", "classes": "tvm-mode tvm-slug", "css": "body.tvm-mode { ... }" }
  # - value:   the ?tvm=VALUE slug used in the URL
  # - label:   human-readable name shown in the admin UI
  # - classes: space-separated body classes applied when the mode is active
  # - css:     custom CSS injected into <head> at runtime (plain CSS, not SCSS)
  # Managed via Admin > Plugins > Topic View Modes
  topic_view_modes_modes:
    default: |
      [{"value":"min","label":"Minimal","classes":"tvm-mode tvm-minimal","css":"","preset":true},{"value":"content","label":"Content Only","classes":"tvm-mode","css":"","preset":true},{"value":"full","label":"Full","classes":"tvm-mode tvm-full","css":"","preset":true}]
    type: string
    client: true
